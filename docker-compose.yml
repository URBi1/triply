services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: triply
      POSTGRES_USER: triply
      POSTGRES_PASSWORD: triply
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  api:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://triply:triply@db:5432/triply
      UPLOAD_DIR: /uploads
      JWT_SECRET: dev_secret_change_in_prod
    volumes:
      - ./backend:/app
      - uploads:/uploads
    depends_on:
      - db
    command: npm run dev

volumes:
  pgdata:
  uploads:
